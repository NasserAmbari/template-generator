<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generator Pesan Teman</title>
    <style>
      :root {
        --primary-color: #4f46e5;
        --primary-hover: #4338ca;
        --bg-color: #f3f4f6;
        --card-bg: #ffffff;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --border-color: #d1d5db;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background-color: var(--card-bg);
        width: 100%;
        max-width: 500px;
        padding: 30px;
        border-radius: 12px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        text-align: center;
        color: var(--text-main);
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.9rem;
      }

      input[type="text"],
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus,
      select:focus,
      textarea:focus {
        border-color: var(--primary-color);
      }

      textarea {
        resize: vertical;
        min-height: 350px;
        line-height: 1.5;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }

      button:hover {
        background-color: var(--primary-hover);
      }

      /* Notifikasi Toast */
      #toast {
        visibility: hidden;
        min-width: 250px;
        background-color: #10b981;
        color: #fff;
        text-align: center;
        border-radius: 8px;
        padding: 12px;
        position: fixed;
        z-index: 1;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.9rem;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        opacity: 0;
        transition:
          opacity 0.3s,
          bottom 0.3s;
      }

      #toast.show {
        visibility: visible;
        opacity: 1;
        bottom: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Generator Pesan</h1>

      <div class="form-group">
        <label for="recipientName">Nama Penerima:</label>
        <input
          type="text"
          id="recipientName"
          placeholder="Contoh: Budi"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="messageResult">Hasil Pesan (Bisa diedit manual):</label>
        <textarea
          id="messageResult"
          placeholder="Pesan akan muncul di sini..."
        ></textarea>
      </div>

      <button id="copyBtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path
            d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
          ></path>
        </svg>
        Copy Pesan
      </button>
    </div>

    <!-- Elemen Toast untuk Notifikasi -->
    <div id="toast">✅ Pesan berhasil di-copy!</div>

    <script>
      const templateUndangan = `Yth. 
{nama}
Di Tempat

Dengan segala kerendahan hati,
kami mengundang Teman-teman untuk menghadiri acara resepsi pernikahan kami,

Pada
📅 Tanggal : 02 Mei 2026
🕘 Pukul : 10:00 s/d Selesai WITA
🏠 Lihat pada link undangan dibawah.

Untuk detail acaranya, bisa kunjungi link berikut*
https://cindia-and-robby.storyofbari.com/?to={nama_url}

Kami sangat berharap Teman-teman untuk hadir dan meramaikan acara yang sangat membahagiakan ini. 

LOVE,
Cindia & Robby`;

      // Mengambil elemen-elemen dari DOM
      const nameInput = document.getElementById("recipientName");
      const resultArea = document.getElementById("messageResult");
      const copyBtn = document.getElementById("copyBtn");
      const toast = document.getElementById("toast");

      // Fungsi untuk meng-generate pesan secara realtime
      function generateMessage() {
        const name = nameInput.value.trim() || "[Nama]";

        // Mengambil teks template dan mengganti {nama} dengan inputan user
        let message = templateUndangan;
        message = message.replace(/{nama}/g, name);
        message = message.replace(/{nama_url}/g, encodeURIComponent(name));

        // Menampilkan di textarea
        resultArea.value = message;
      }

      // Event listeners agar teks berubah otomatis saat user mengetik atau memilih opsi
      nameInput.addEventListener("input", generateMessage);

      // Fungsi untuk menyalin teks ke clipboard
      copyBtn.addEventListener("click", () => {
        const textToCopy = resultArea.value;

        if (!textToCopy) return;

        // Menggunakan Clipboard API modern
        navigator.clipboard
          .writeText(textToCopy)
          .then(() => {
            showToast();
          })
          .catch((err) => {
            alert("Gagal menyalin pesan: " + err);
          });
      });

      // Fungsi untuk menampilkan notifikasi "Berhasil Copy"
      function showToast() {
        toast.className = "show";
        setTimeout(() => {
          toast.className = toast.className.replace("show", "");
        }, 3000); // Notifikasi hilang setelah 3 detik
      }

      // Menjalankan fungsi sekali di awal agar textarea tidak kosong
      generateMessage();
    </script>
  </body>
</html>
